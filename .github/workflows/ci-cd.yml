name: CloudScale CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  ACR_NAME: acrdiefallah4808final26
  ACR_LOGIN_SERVER: acrdiefallah4808final26.azurecr.io
  AKS_RESOURCE_GROUP: rg-diefallah-cloudscale-final
  AKS_CLUSTER_NAME: aks-diefallah-final
  IMAGE_NAME: cloudscale-web
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-test:
    name: Build and Test Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run application tests
        working-directory: app
        run: npm test

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

  push-to-acr:
    name: Push Image to Azure Container Registry
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push Docker image
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG .
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG

  deploy-to-aks:
    name: Deploy to AKS Production
    needs: push-to-acr
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $AKS_RESOURCE_GROUP \
            --name $AKS_CLUSTER_NAME \
            --admin \
            --overwrite-existing

      - name: Deploy application to AKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl set image deployment/cloudscale-web cloudscale-web=$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
          kubectl rollout status deployment/cloudscale-web